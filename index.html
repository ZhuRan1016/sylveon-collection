<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f5abc8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<title>仙子伊布日版收藏图鉴</title>
</head>
<body>
<header class="app-header">
  <div class="title-row">
    <div>
      <h1>🎀 仙子伊布日版收藏图鉴</h1>
      <p>SYLDB v2 · 个人收藏用</p>
    </div>
    <button id="menuBtn" class="icon-btn" aria-label="更多">⋯</button>
  </div>
  <div class="summary-card">
    <div>
      <div class="summary-label">收藏进度</div>
      <div id="summaryCount" class="summary-number">0 / 0</div>
    </div>
    <div id="summaryPercent" class="summary-percent">0%</div>
    <div class="progress"><div id="progressBar"></div></div>
  </div>
</header>

<main>
  <section class="controls">
    <input id="searchInput" type="search" placeholder="搜索卡名、卡号、系列、版本">
    <div class="filter-row">
      <select id="statusFilter">
        <option value="all">全部状态</option>
        <option value="owned">已收集</option>
        <option value="missing">未收集</option>
      </select>
      <select id="rarityFilter">
        <option value="all">全部稀有度</option>
      </select>
    </div>
  </section>

  <nav id="eraTabs" class="era-tabs"></nav>

  <section id="eraStats" class="era-stats"></section>

  <section id="cardGrid" class="card-grid"></section>
  <div id="emptyState" class="empty-state" hidden>没有符合条件的卡。</div>
</main>

<div id="menuSheet" class="sheet" hidden>
  <div class="sheet-panel">
    <h2>数据管理</h2>
    <button id="exportBtn">导出收藏备份</button>
    <label class="sheet-action">导入收藏备份<input id="importFile" type="file" accept=".json" hidden></label>
    <button id="migrateBtn">迁移旧版收藏记录</button>
    <button id="resetBtn" class="danger">清空收藏状态</button>
    <button id="closeMenuBtn" class="secondary">关闭</button>
  </div>
</div>

<div id="detailModal" class="modal" hidden>
  <div class="modal-panel">
    <button id="closeModalBtn" class="modal-close">×</button>
    <div id="modalVisual" class="modal-visual"></div>
    <h2 id="modalName"></h2>
    <div id="modalNumber" class="modal-number"></div>
    <dl id="modalMeta"></dl>
    <button id="modalOwnedBtn" class="owned-action"></button>
    <a id="modalSource" target="_blank" rel="noopener" hidden>查看资料来源</a>
  </div>
</div>

<footer>收藏记录保存在当前浏览器。换设备前请先导出备份。</footer>
<script src="app.js"></script>
</body>
</html>
