<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f4a9c6">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<title>仙子伊布收藏状态</title>
</head>
<body>
<header>
  <h1>🎀 仙子伊布收藏状态</h1>
  <div class="progress"><div id="bar"></div></div>
  <div class="stats"><span id="count">已收集 0 / 0</span><span id="percent">0%</span></div>
</header>
<main>
  <div class="toolbar">
    <input id="search" placeholder="搜索卡号、名称、系列">
    <select id="filter">
      <option value="all">全部</option>
      <option value="owned">已收集</option>
      <option value="missing">未收集</option>
    </select>
    <button id="exportBtn">导出备份</button>
    <label class="button">导入备份<input id="importFile" type="file" accept=".json" hidden></label>
  </div>
  <div id="eras" class="eras"></div>
  <section id="list"></section>
</main>
<script src="app.js"></script>
</body>
</html>
